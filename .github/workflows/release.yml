name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            name: ostendo-macos-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: ostendo-macos-x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: ostendo-linux-x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: ostendo-windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/ostendo ${{ matrix.name }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/ostendo.exe ${{ matrix.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package binaries
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            if [[ "$name" == *.exe ]]; then
              zip "../${name%.exe}-windows-x86_64.zip" "$dir$name"
            else
              tar czf "../${name}.tar.gz" -C "$dir" "$name"
            fi
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz
            *.zip
          generate_release_notes: false
          body: |
            ## Ostendo ${{ github.ref_name }}

            *Latin: ostendo — to show, to display, to exhibit.*

            AI-native terminal presentation tool — markdown to slides in your terminal.

            ### Downloads

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `ostendo-macos-arm64.tar.gz` |
            | macOS (Intel) | `ostendo-macos-x86_64.tar.gz` |
            | Linux (x86_64) | `ostendo-linux-x86_64.tar.gz` |
            | Windows (x86_64) | `ostendo-windows-x86_64.zip` |

            ### Build from source

            ```bash
            cargo build --release
            ```

            Requires Rust 1.75+.

            ### License

            GNU General Public License v3.0
